<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Location Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel controls">
        <div>
          <p class="eyebrow">Consent-based location</p>
          <h1>Invite a phone to share GPS</h1>
          <p class="muted">The phone owner must open the invite, tap Start sharing, and allow location permission.</p>
        </div>

        <div class="control-stack">
          <div class="search-row">
            <input id="searchPhone" type="tel" placeholder="+919876543210" autocomplete="tel" />
            <button id="trackBtn">Track</button>
            <button id="inviteBtn" class="secondary">Invite</button>
          </div>
          <p id="status" class="status">Enter a phone number, create an invite, then track after sharing starts.</p>
        </div>
      </section>

      <section id="map" aria-label="Map showing shared phone location">
        <iframe
          id="mapFrame"
          title="Google Map location"
          src="https://maps.google.com/maps?q=20.5937,78.9629&z=5&t=m&output=embed"
          allowfullscreen
          loading="lazy"
        ></iframe>
      </section>
    </main>

    <script src="/static/dashboard.js"></script>
  </body>
</html>
